name             = "solia-enrichment"
main             = "solia-enrichment.js"
compatibility_date = "2024-09-23"

# ─── Variables non-secrètes ───
[vars]
REPO_OWNER = "soliapro"
REPO_NAME  = "solia"

# ─── Cron Trigger — séquence emails J1/J3/J6 ───
[triggers]
crons = ["0 9 * * *"]

# ─── Secrets à configurer via CLI (ne jamais mettre ici) ───
# wrangler secret put ANTHROPIC_API_KEY
# wrangler secret put GITHUB_TOKEN
# wrangler secret put STRIPE_WEBHOOK_SECRET
# wrangler secret put BREVO_API_KEY
#
# GitHub Token requis : Personal Access Token (classic)
#   Scopes : repo (lecture + écriture), workflow (trigger dispatch)

# ─── Déploiement ───
# Depuis la racine du projet :
#   npx wrangler deploy --config worker/wrangler.toml
#
# Ou depuis le dossier worker/ :
#   cd worker && npx wrangler deploy

# ─── Routes (optionnel si domaine custom) ───
# [[routes]]
# pattern = "api.solia.me/*"
# zone_name = "solia.me"
