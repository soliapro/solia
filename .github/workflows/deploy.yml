name: Deploy Solia Pages

on:
  push:
    branches: [main]
    paths:
      - 'templates/**'
      - 'scripts/**'

  # Trigger depuis le Worker Cloudflare
  repository_dispatch:
    types: [rebuild-page]

  # Rebuild manuel
  workflow_dispatch:

# Eviter les deploys concurrents qui s'annulent
concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Générer toutes les pages
        run: |
          for f in prospects/*.json; do
            [ -f "$f" ] || continue
            node scripts/generate-pages.js "$f" --force
          done

      - name: Régénérer le dashboard
        run: node scripts/generate-dashboard.js

      - name: Déployer sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./demos
          keep_files: true
