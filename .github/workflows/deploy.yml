name: Deploy Solia Pages

on:
  # Rebuild automatique quand un JSON est modifié sur main
  push:
    branches: [main]
    paths:
      - 'prospects/**'
      - 'templates/**'
      - 'scripts/**'
      - 'demos/**'

  # Trigger depuis le Worker Cloudflare (POST /api/personalize → triggerRebuild)
  repository_dispatch:
    types: [rebuild-page]

  # Rebuild manuel depuis l'interface GitHub
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Générer toutes les pages prospect
        run: |
          for f in prospects/*.json; do
            [ -f "$f" ] || continue
            echo "→ $f"
            node scripts/generate-pages.js "$f" --force
          done

      - name: Régénérer le dashboard
        run: node scripts/generate-dashboard.js

      - name: Déployer sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./demos
          force_orphan: true
