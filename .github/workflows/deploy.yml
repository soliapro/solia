name: Deploy Solia Pages

on:
  push:
    branches: [main]
    paths:
      - 'templates/**'
      - 'scripts/**'
      # prospects/** retire volontairement : l'import CSV declenche
      # des dizaines de commits. Le rebuild se fait via repository_dispatch
      # a la fin de l'import.

  # Trigger depuis le Worker Cloudflare (POST /api/personalize → triggerRebuild)
  repository_dispatch:
    types: [rebuild-page]

  # Rebuild manuel depuis l'interface GitHub
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Générer la page modifiée (rebuild ciblé)
        if: github.event_name == 'repository_dispatch' && github.event.client_payload.slug != ''
        run: |
          SLUG="${{ github.event.client_payload.slug }}"
          FILE="prospects/${SLUG}.json"
          if [ -f "$FILE" ]; then
            echo "→ Rebuild ciblé : $FILE"
            node scripts/generate-pages.js "$FILE" --force
          else
            echo "⚠ Fichier non trouvé : $FILE — rebuild complet"
            for f in prospects/*.json; do
              [ -f "$f" ] || continue
              echo "→ $f"
              node scripts/generate-pages.js "$f" --force
            done
          fi

      - name: Générer toutes les pages (rebuild complet)
        if: github.event_name != 'repository_dispatch' || github.event.client_payload.slug == ''
        run: |
          for f in prospects/*.json; do
            [ -f "$f" ] || continue
            echo "→ $f"
            node scripts/generate-pages.js "$f" --force
          done

      - name: Régénérer le dashboard
        run: node scripts/generate-dashboard.js

      - name: Déployer sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./demos
          keep_files: true
